# Puzzlebot Robot Parameters
# Mini Challenge 2: Simulation, Localization, Control

robot:
  # Wheel parameters
  wheel_radius: 0.05      # meters
  wheelbase: 0.19         # distance between wheels (l)
  
  # Position limits (for safety)
  max_linear_velocity: 0.5    # m/s
  max_angular_velocity: 2.0   # rad/s
  
  # Simulation parameters
  dt: 0.05                # Time step for integration (seconds)
  integration_method: "euler"  # "euler" or "rk4"

# Localization parameters
localization:
  publish_rate: 20        # Hz
  # Covariance for odometry (diagonal values)
  position_covariance: 0.01   # 10 cm uncertainty
  orientation_covariance: 0.1 # 0.1 rad uncertainty

# Control parameters
control:
  # PD gains for linear velocity
  kp_linear: 0.3
  kd_linear: 0.1
  
  # PD gains for angular velocity
  kp_angular: 0.5
  kd_angular: 0.1
  
  # Tolerances for waypoint reaching
  position_tolerance: 0.15    # meters
  angle_tolerance: 0.1        # radians
  
  # Control rate
  control_rate: 20            # Hz

# Trajectory parameters
trajectory:
  # Default trajectory shape: "square", "pentagon", "circle"
  default_shape: "square"
  
  # Dimensions (meters)
  square_size: 1.0
  pentagon_size: 0.8
  
  # How close to get to each waypoint before moving to next
  waypoint_tolerance: 0.15

# RViz visualization
visualization:
  # Frame names
  base_frame: "base_link"
  odom_frame: "odom"
  map_frame: "map"
